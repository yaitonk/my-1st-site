<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Cupping</title>
    <style>
        #format-toggle {
            margin-bottom: 1em;
        }
    </style>
</head>
<body>
    <h1>Mini Cupping</h1>
    <div id="format-toggle">
        <label for='toggle'>Select Format: </label>
        <select id='toggle'>
            <option value='apple-notes'>Apple Notes</option>
            <option value='logseq'>Logseq MD</option>
        </select>
    </div>

    <textarea id='output' rows="10" cols="50"></textarea>
    <br>
    <button id='copy-apple'>Copy as Apple Notes</button>
    <button id='copy-logseq'>Copy as Logseq MD</button>

    <script>
        const output = document.getElementById('output');
        const toggle = document.getElementById('toggle');
        const copyAppleButton = document.getElementById('copy-apple');
        const copyLogseqButton = document.getElementById('copy-logseq');

        function generateMarkdown() {
            const format = toggle.value;
            let content;
            if (format === 'apple-notes') {
                content = "Your content formatted for Apple Notes.";
            } else {
                content = "Your content formatted for Logseq.";
            }
            output.value = content;
        }

        dataToggle.addEventListener('change', generateMarkdown);
        copyAppleButton.addEventListener('click', () => {
            navigator.clipboard.writeText(output.value);
            alert('Copied to clipboard: Apple Notes!');
        });
        copyLogseqButton.addEventListener('click', () => {
            navigator.clipboard.writeText(output.value);
            alert('Copied to clipboard: Logseq MD!');
        });

        // Generate initial markdown content
        generateMarkdown();
    </script>
</body>
</html>
