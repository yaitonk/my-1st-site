<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Cupping Form — Pro Max Theme</title>
  <style>
    :root {
      --bg1:#eef4ff;
      --bg2:#f8f6ff;
      --bg3:#f6fbf7;
      --glass:rgba(255,255,255,0.54);
      --glass-strong:rgba(255,255,255,0.72);
      --line:rgba(255,255,255,0.72);
      --text:#16202f;
      --muted:#667085;
      --chip:rgba(255,255,255,0.64);
      --accent:#5564ff;
      --accent-soft:rgba(85,100,255,0.12);
      --shadow:0 20px 60px rgba(23,33,47,0.10);
    }

    body.dark {
      --bg1:#0b0f17;
      --bg2:#0f1624;
      --bg3:#0a0d14;
      --glass:rgba(20,24,35,0.55);
      --glass-strong:rgba(20,24,35,0.75);
      --line:rgba(255,255,255,0.08);
      --text:#e6ebf2;
      --muted:#9aa4b2;
      --chip:rgba(255,255,255,0.05);
      --accent:#7c8cff;
      --accent-soft:rgba(124,140,255,0.15);
      --shadow:0 20px 60px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(131,182,255,0.34), transparent 23%),
        radial-gradient(circle at 88% 10%, rgba(255,205,153,0.26), transparent 24%),
        radial-gradient(circle at 80% 84%, rgba(110,231,183,0.18), transparent 22%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3));
      min-height: 100vh;
      padding: 18px;
      transition: background .25s ease, color .25s ease;
    }

    .orb{
      position:fixed;
      width:320px;
      height:320px;
      border-radius:999px;
      filter:blur(20px);
      opacity:0.42;
      pointer-events:none;
      z-index:0;
      animation:float 15s ease-in-out infinite;
    }
    .orb.one{ top:2%; left:-80px; background:radial-gradient(circle, rgba(100,149,237,0.34), transparent 60%); }
    .orb.two{ top:46%; right:-90px; background:radial-gradient(circle, rgba(255,185,122,0.26), transparent 60%); animation-delay:-5s; }
    .orb.three{ bottom:-50px; left:28%; background:radial-gradient(circle, rgba(110,231,183,0.22), transparent 60%); animation-delay:-9s; }
    @keyframes float{ 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(-18px) translateX(12px)} }

    .wrap {
      max-width: 1380px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero {
      padding: 24px;
      border-radius: 32px;
      margin-bottom: 18px;
      background: var(--glass);
      border: 1px solid var(--line);
      backdrop-filter: blur(24px) saturate(1.25);
      -webkit-backdrop-filter: blur(24px) saturate(1.25);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-60px;
      bottom:-80px;
      width:240px;
      height:240px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,255,255,0.36), transparent 68%);
      pointer-events:none;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:var(--chip);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      margin-bottom:12px;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    #themeToggle{
      border:1px solid var(--line);
      background:var(--chip);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      font: inherit;
      backdrop-filter: blur(10px);
      transition:0.2s;
    }

    #themeToggle:hover{
      transform:translateY(-1px);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 0;
      font-size: 14px;
      line-height: 1.45;
      max-width: 760px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.12fr 0.88fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 2px 0 14px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .main-fields {
      display: grid;
      grid-template-columns: repeat(6, minmax(0,1fr));
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .span-6 { grid-column: span 6; }
    .span-3 { grid-column: span 3; }
    .span-2 { grid-column: span 2; }

    label {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    input, textarea, select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px 12px;
      background: var(--chip);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      line-height: 1.3;
      outline: none;
      transition: 0.18s ease;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(85,100,255,0.35);
      box-shadow: 0 0 0 4px rgba(85,100,255,0.10);
      background: rgba(255,255,255,0.82);
    }

    body.dark input:focus,
    body.dark textarea:focus,
    body.dark select:focus {
      background: rgba(255,255,255,0.08);
    }

    input, select {
      height: 42px;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .group { margin-bottom: 16px; }

    .group h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--accent);
      text-transform: capitalize;
      letter-spacing: -0.01em;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      padding: 7px 11px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
      user-select: none;
      transition: .18s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
    }

    .chip.active {
      background: var(--accent-soft);
      border-color: rgba(85,100,255,0.28);
      color: var(--accent);
      font-weight: 700;
    }

    .custom-row {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .custom-row input {
      flex: 1;
    }

    .custom-toggle {
      min-width: fit-content;
    }

    .mini-intensity {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.55);
    }

    body.dark .mini-intensity {
      background: rgba(255,255,255,0.03);
    }

    .mini-intensity + .mini-intensity {
      margin-top: 8px;
    }

    .mini-intensity-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .mini-intensity-label {
      color: var(--muted);
    }

    .mini-intensity-value {
      font-weight: 800;
      min-width: 18px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      padding: 0;
      height: auto;
      border: none;
      background: transparent;
      accent-color: var(--accent);
    }

    .intensity-band {
      margin-top: 8px;
    }

    .intensity-segments {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      height: 10px;
      background: rgba(255,255,255,0.55);
    }

    body.dark .intensity-segments {
      background: rgba(255,255,255,0.03);
    }

    .intensity-segment {
      position: relative;
    }

    .intensity-segment + .intensity-segment {
      border-left: 1px solid var(--line);
    }

    .intensity-labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin-top: 5px;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      line-height: 1.1;
      letter-spacing: 0.06em;
    }

    .detail-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .detail-fields .full {
      grid-column: 1 / -1;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 16px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      transition: .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.primary {
      background: linear-gradient(135deg, #5564ff, #6b7aff);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(85,100,255,0.22);
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(255,255,255,0.58);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      min-height: 360px;
      font-size: 13px;
      line-height: 1.55;
      overflow: auto;
      margin: 0;
    }

    body.dark pre {
      background: rgba(255,255,255,0.03);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
      line-height: 1.45;
    }

    .descriptor-output {
      margin-bottom: 14px;
      display: grid;
      gap: 10px;
    }

    .descriptor-row {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.56);
      padding: 12px;
    }

    body.dark .descriptor-row {
      background: rgba(255,255,255,0.03);
    }

    .descriptor-label {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 7px;
    }

    .descriptor-score-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .descriptor-score {
      font-weight: 800;
    }

    .descriptor-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .descriptor-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--chip);
      font-size: 12px;
      line-height: 1.2;
      color: var(--text);
    }

    .descriptor-empty {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .descriptor-meter {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .descriptor-meter + .descriptor-meter {
      margin-top: 4px;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .hero { padding: 18px; border-radius: 24px; }
      .wrap { padding: 0; }
      h1 { font-size: 24px; }
      .sub { font-size: 12px; }
      .card { padding: 14px; border-radius: 22px; }
      .section-title { font-size: 16px; margin-bottom: 10px; }

      .main-fields {
        grid-template-columns: repeat(6, minmax(0,1fr));
        gap: 8px;
      }

      .main-fields .coffee-field { grid-column: span 6; }
      .main-fields .orig-field,
      .main-fields .var-field,
      .main-fields .date-field,
      .main-fields .by-field { grid-column: span 3; }
      .main-fields .sess-field,
      .main-fields .rnd-field,
      .main-fields .id-field { grid-column: span 2; }
      .main-fields .proc-field { grid-column: span 6; }

      label { font-size: 10px; }
      input, select { height: 40px; font-size: 13px; }
      textarea { min-height: 74px; font-size: 13px; }

      .chips { gap: 6px; }
      .chip { font-size: 11px; padding: 6px 9px; }
      .group h3 { font-size: 13px; }
      .custom-row { gap: 6px; }
      .detail-fields { grid-template-columns: 1fr; gap: 8px; margin-top: 12px; }
      .actions { gap: 8px; }
      button { font-size: 12px; padding: 9px 12px; }
      pre { min-height: 280px; font-size: 12px; padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <div class="wrap">
    <div class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">✦ Pro Max Theme · Casa R&amp;D</div>
          <h1>mini CVA Cupping Form</h1>
          <div class="sub">Glass UI theme เดียวกับ dashboard · compact · ใช้งานง่ายบน iPad / iPhone / Android</div>
        </div>
        <div class="hero-actions">
          <button id="themeToggle">🌙 Dark</button>
        </div>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <div class="section-title">ข้อมูลหลัก</div>
          <div class="main-fields">
            <div class="field span-6 coffee-field">
              <label>Coffee</label>
              <input id="coffee" placeholder="Alto Quiel Selecto Natural" />
            </div>

            <div class="field span-3 orig-field">
              <label>Origin</label>
              <input id="origin" placeholder="Panama" />
            </div>

            <div class="field span-3 var-field">
              <label>Variety</label>
              <input id="variety" placeholder="Geisha" />
            </div>

            <div class="field span-3 date-field">
              <label>Date</label>
              <input id="cupping_date" type="date" />
            </div>

            <div class="field span-3 by-field">
              <label>By</label>
              <input id="cupper" placeholder="Name" />
            </div>

            <div class="field span-2 sess-field">
              <label>Session</label>
              <select id="session">
                <option value="">-</option>
                <option value="AM">AM</option>
                <option value="PM">PM</option>
                <option value="S1">S1</option>
                <option value="S2">S2</option>
                <option value="S3">S3</option>
                <option value="Final">Final</option>
              </select>
            </div>

            <div class="field span-2 rnd-field">
              <label>Round</label>
              <select id="round_no">
                <option value="">-</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>

            <div class="field span-2 id-field">
              <label>ID</label>
              <input id="sample_id" placeholder="B04" />
            </div>

            <div class="field span-6 proc-field">
              <label>Process</label>
              <input id="process" placeholder="Natural" />
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:14px;">
          <div class="section-title">Descriptors</div>
          <div id="descriptor-groups"></div>

          <div class="detail-fields">
            <div class="field full">
              <label>Overall & Remark</label>
              <textarea id="descriptive_notes" placeholder="floral low / โทนดอกไม้ยังเบา, sweetness clear / ความหวานชัด"></textarea>
            </div>

            <div class="field">
              <label>Defects</label>
              <input id="defects" placeholder="none / ไม่มี" />
            </div>

            <div class="field full">
              <label>Tasting Notes</label>
              <textarea id="tasting_notes" placeholder="sweet, clean, good mouthfeel / หวานสะอาด สัมผัสดี"></textarea>
            </div>

            <div class="field full">
              <label>Next</label>
              <textarea id="next_action" placeholder="compare with artisan graph later / ค่อยเทียบกับกราฟ Artisan ภายหลัง"></textarea>
            </div>

            <div class="field full">
              <label>Tags</label>
              <input id="tags" value="#cupping #cva #coffee" />
            </div>
          </div>

          <div class="actions">
            <button type="button" class="primary" id="generateBtn">Generate</button>
            <button type="button" id="copyBtn">Copy</button>
            <button type="button" id="copyLogseqBtn">Copy for Logseq</button>
            <button type="button" id="downloadJsonBtn">Download JSON</button>
            <button type="button" id="downloadMdBtn">Download Markdown</button>
            <button type="button" id="resetBtn">Reset</button>
          </div>

          <div class="hint" id="filenamePreview"></div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">ผลลัพธ์</div>
        <div id="descriptorOutput" class="descriptor-output"></div>
        <pre id="output"></pre>
        <div class="hint">Don’t be swayed by the fragrance!</div>
      </div>
    </div>
  </div>

  <script>
    const descriptorData = {
      fragrance_aroma: [
        'floral / ดอกไม้','jasmine / มะลิ','bergamot / เบอร์กามอต','citrus / ซิตรัส',
        'berry / เบอร์รี','tropical fruit / ผลไม้เมืองร้อน','stone fruit / ผลไม้เมล็ดแข็ง',
        'honey / น้ำผึ้ง','candy / ลูกกวาด','caramel / คาราเมล','tea-like / คล้ายชา',
        'herbal / สมุนไพร','cocoa / โกโก้','spice / เครื่องเทศ'
      ],
      flavor: [
        'floral / ดอกไม้','jasmine / มะลิ','bergamot / เบอร์กามอต','citrus / ซิตรัส',
        'berry / เบอร์รี','tropical fruit / ผลไม้เมืองร้อน','stone fruit / ผลไม้เมล็ดแข็ง',
        'apple / แอปเปิล','grape / องุ่น','honey / น้ำผึ้ง','candy / ลูกกวาด',
        'caramel / คาราเมล','tea-like / คล้ายชา','cocoa / โกโก้','spice / เครื่องเทศ'
      ],
      aftertaste: [
        'clean / สะอาด','sweet / หวาน','floral / ดอกไม้','tea-like / คล้ายชา',
        'short / สั้น','medium / ปานกลาง','long / ยาว','drying / ฝาดแห้ง',
        'slightly bitter / ขมเล็กน้อย'
      ],
      acidity: [
        'citric / ซิตรัส','malic / มาลิก','tartaric / ทาร์ทาริก','phosphoric / ฟอสฟอริก',
        'lactic / แลกติก','soft / นุ่ม','bright / สดใส','round / กลม','sharp / คม'
      ],
      sweetness: [
        'sugar / น้ำตาล','honey / น้ำผึ้ง','candy / ลูกกวาด','caramel / คาราเมล',
        'brown sugar / น้ำตาลทรายแดง','molasses / กากน้ำตาล','ripe fruit / ผลไม้สุก',
        'jammy / แยม','clean sweet / หวานสะอาด'
      ],
      mouthfeel: [
        'silky / เนียน','juicy / ฉ่ำ','creamy / ครีมมี','smooth / ลื่น',
        'tea-like / คล้ายชา','syrupy / หนืดหวาน','dense / แน่น',
        'thin / บาง','drying / ฝาดแห้ง'
      ]
    };

    const fieldLabels = {
      fragrance_aroma: 'fragrance/aroma',
      flavor: 'flavor',
      aftertaste: 'aftertaste',
      acidity: 'acidity',
      sweetness: 'sweetness',
      mouthfeel: 'mouthfeel'
    };

    const selected = {};
    Object.keys(descriptorData).forEach(k => selected[k] = []);

    function getLocalDateString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function createIntensityBand() {
      const band = document.createElement('div');
      band.className = 'intensity-band';
      band.innerHTML = `
        <div class="intensity-segments">
          <div class="intensity-segment"></div>
          <div class="intensity-segment"></div>
          <div class="intensity-segment"></div>
        </div>
        <div class="intensity-labels">
          <span>LOW</span>
          <span>MEDIUM</span>
          <span>HIGH</span>
        </div>
      `;
      return band;
    }

    function createMiniIntensity(labelText, valueId, rangeId) {
      const miniIntensity = document.createElement('div');
      miniIntensity.className = 'mini-intensity';

      const miniHead = document.createElement('div');
      miniHead.className = 'mini-intensity-head';

      const miniLabel = document.createElement('span');
      miniLabel.className = 'mini-intensity-label';
      miniLabel.textContent = labelText;

      const miniValue = document.createElement('strong');
      miniValue.className = 'mini-intensity-value';
      miniValue.id = valueId;
      miniValue.textContent = '0';

      miniHead.appendChild(miniLabel);
      miniHead.appendChild(miniValue);

      const range = document.createElement('input');
      range.type = 'range';
      range.min = '0';
      range.max = '15';
      range.step = '1';
      range.value = '0';
      range.id = rangeId;
      range.addEventListener('input', () => {
        miniValue.textContent = range.value;
      });

      miniIntensity.appendChild(miniHead);
      miniIntensity.appendChild(range);
      miniIntensity.appendChild(createIntensityBand());

      return miniIntensity;
    }

    function renderDescriptors() {
      const root = document.getElementById('descriptor-groups');
      root.innerHTML = '';

      Object.entries(descriptorData).forEach(([field, options]) => {
        const group = document.createElement('div');
        group.className = 'group';

        const title = document.createElement('h3');
        title.textContent = fieldLabels[field] || field;

        const chips = document.createElement('div');
        chips.className = 'chips';

        options.forEach(option => {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'chip';
          chip.textContent = option;

          chip.addEventListener('click', () => {
            const arr = selected[field];
            const idx = arr.indexOf(option);

            if (idx >= 0) {
              arr.splice(idx, 1);
              chip.classList.remove('active');
            } else {
              arr.push(option);
              chip.classList.add('active');
            }
          });

          chips.appendChild(chip);
        });

        const customRow = document.createElement('div');
        customRow.className = 'custom-row';

        const customToggle = document.createElement('button');
        customToggle.type = 'button';
        customToggle.className = 'chip custom-toggle';
        customToggle.textContent = 'other / อื่นๆ';

        const customInput = document.createElement('input');
        customInput.id = 'custom_' + field;
        customInput.placeholder = 'พิมพ์ descriptor เพิ่มเอง';

        customToggle.addEventListener('click', () => customInput.focus());

        customRow.appendChild(customToggle);
        customRow.appendChild(customInput);

        group.appendChild(title);
        group.appendChild(chips);
        group.appendChild(customRow);

        if (field === 'fragrance_aroma') {
          group.appendChild(
            createMiniIntensity('Fragrance 0–15', 'fragrance_value', 'intensity_fragrance')
          );
          group.appendChild(
            createMiniIntensity('Aroma 0–15', 'aroma_value', 'intensity_aroma')
          );
        } else {
          group.appendChild(
            createMiniIntensity('Intensity 0–15', field + '_value', 'intensity_' + field)
          );
        }

        root.appendChild(group);
      });
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : '';
    }

    function scoreBar(value, max = 15) {
      const n = Number(value || 0);
      const filled = Math.max(0, Math.min(5, Math.round((n / max) * 5)));
      return '█'.repeat(filled) + '░'.repeat(5 - filled);
    }

    function line(prefix, value) {
      return value ? `${prefix} ${value}` : `${prefix} -`;
    }

    function collectDescriptor(field) {
      const vals = [...selected[field]];
      const custom = getValue('custom_' + field);
      if (custom) vals.push('other / อื่นๆ: ' + custom);
      return vals.join(', ');
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderDescriptorOutput() {
      const root = document.getElementById('descriptorOutput');

      const descriptorFields = [
        { key: 'fragrance_aroma', label: '👃 Fragrance/Aroma' },
        { key: 'flavor', label: '🍬 Flavor' },
        { key: 'aftertaste', label: '🫧 Aftertaste' },
        { key: 'acidity', label: '✨ Acidity' },
        { key: 'sweetness', label: '🍯 Sweetness' },
        { key: 'mouthfeel', label: '🫶 Mouthfeel' }
      ];

      root.innerHTML = descriptorFields.map(({ key, label }) => {
        const values = [...selected[key]];
        const custom = getValue('custom_' + key);
        if (custom) values.push('other / อื่นๆ: ' + custom);

        const tagsHtml = values.length
          ? `<div class="descriptor-tags">
              ${values.map(v => `<span class="descriptor-tag">${escapeHtml(v)}</span>`).join('')}
            </div>`
          : `<div class="descriptor-empty">-</div>`;

        if (key === 'fragrance_aroma') {
          const fragrance = getValue('intensity_fragrance') || '0';
          const aroma = getValue('intensity_aroma') || '0';

          return `
            <div class="descriptor-row">
              <div class="descriptor-label">
                <span>${label}</span>
                <span class="descriptor-score-stack">
                  <span class="descriptor-score">Fragrance ${fragrance}/15</span>
                  <span class="descriptor-score">Aroma ${aroma}/15</span>
                </span>
              </div>
              ${tagsHtml}
              <div class="descriptor-meter">Fragrance  ${scoreBar(fragrance)}</div>
              <div class="descriptor-meter">Aroma      ${scoreBar(aroma)}</div>
            </div>
          `;
        }

        const intensity = getValue('intensity_' + key) || '0';

        return `
          <div class="descriptor-row">
            <div class="descriptor-label">
              <span>${label}</span>
              <span class="descriptor-score-stack">
                <span class="descriptor-score">${intensity}/15</span>
              </span>
            </div>
            ${tagsHtml}
            <div class="descriptor-meter">${scoreBar(intensity)}</div>
          </div>
        `;
      }).join('');
    }

    function generateOutput() {
      const lines = [];
      lines.push('☕ CVA Cupping Note');
      lines.push('');
      lines.push(`Coffee: ${getValue('coffee') || '-'}`);
      lines.push(`Sample: ${getValue('sample_id') || '-'}`);
      lines.push(`Date: ${getValue('cupping_date') || '-'}`);
      lines.push(`Cupper: ${getValue('cupper') || '-'}`);
      lines.push(`Session: ${getValue('session') || '-'}`);
      lines.push(`Round: ${getValue('round_no') || '-'}`);
      lines.push(`Origin: ${getValue('origin') || '-'}`);
      lines.push(`Variety: ${getValue('variety') || '-'}`);
      lines.push(`Process: ${getValue('process') || '-'}`);
      lines.push('');
      lines.push('— Descriptors —');
      lines.push(line('👃 Fragrance/Aroma:', collectDescriptor('fragrance_aroma')));
      lines.push(line('🍬 Flavor:', collectDescriptor('flavor')));
      lines.push(line('🫧 Aftertaste:', collectDescriptor('aftertaste')));
      lines.push(line('✨ Acidity:', collectDescriptor('acidity')));
      lines.push(line('🍯 Sweetness:', collectDescriptor('sweetness')));
      lines.push(line('🫶 Mouthfeel:', collectDescriptor('mouthfeel')));
      lines.push(line('📝 Notes:', getValue('descriptive_notes')));
      lines.push('');
      lines.push('— Intensity (0–15) —');
      lines.push(`👃 Fragrance: ${getValue('intensity_fragrance') || '0'}   ${scoreBar(getValue('intensity_fragrance'))}`);
      lines.push(`👃 Aroma: ${getValue('intensity_aroma') || '0'}   ${scoreBar(getValue('intensity_aroma'))}`);
      lines.push(`🍬 Flavor: ${getValue('intensity_flavor') || '0'}   ${scoreBar(getValue('intensity_flavor'))}`);
      lines.push(`🫧 Aftertaste: ${getValue('intensity_aftertaste') || '0'}   ${scoreBar(getValue('intensity_aftertaste'))}`);
      lines.push(`✨ Acidity: ${getValue('intensity_acidity') || '0'}   ${scoreBar(getValue('intensity_acidity'))}`);
      lines.push(`🍯 Sweetness: ${getValue('intensity_sweetness') || '0'}   ${scoreBar(getValue('intensity_sweetness'))}`);
      lines.push(`🫶 Mouthfeel: ${getValue('intensity_mouthfeel') || '0'}   ${scoreBar(getValue('intensity_mouthfeel'))}`);
      lines.push('');
      lines.push(line('⚠️ Defects:', getValue('defects')));
      lines.push(line('💭 Tasting Notes:', getValue('tasting_notes')));
      lines.push(line('➡️ Next action:', getValue('next_action')));
      lines.push('');
      lines.push(getValue('tags') || '#cupping #cva #coffee');

      const text = lines.join('\n');
      document.getElementById('output').textContent = text;
      renderDescriptorOutput();

      const preview = document.getElementById('filenamePreview');
      if (preview) {
        preview.textContent = `Filename: ${getSafeFilenameBase()}`;
      }

      return text;
    }

    function buildLogseqOutput() {
      const lines = [];
      lines.push(`- ☕ CVA Cupping Note`);
      lines.push(`  - Coffee:: ${getValue('coffee') || '-'}`);
      lines.push(`  - Sample:: ${getValue('sample_id') || '-'}`);
      lines.push(`  - Date:: ${getValue('cupping_date') || '-'}`);
      lines.push(`  - Cupper:: ${getValue('cupper') || '-'}`);
      lines.push(`  - Session:: ${getValue('session') || '-'}`);
      lines.push(`  - Round:: ${getValue('round_no') || '-'}`);
      lines.push(`  - Origin:: ${getValue('origin') || '-'}`);
      lines.push(`  - Variety:: ${getValue('variety') || '-'}`);
      lines.push(`  - Process:: ${getValue('process') || '-'}`);
      lines.push(`  - Descriptors`);
      lines.push(`    - Fragrance/Aroma:: ${collectDescriptor('fragrance_aroma') || '-'}`);
      lines.push(`    - Flavor:: ${collectDescriptor('flavor') || '-'}`);
      lines.push(`    - Aftertaste:: ${collectDescriptor('aftertaste') || '-'}`);
      lines.push(`    - Acidity:: ${collectDescriptor('acidity') || '-'}`);
      lines.push(`    - Sweetness:: ${collectDescriptor('sweetness') || '-'}`);
      lines.push(`    - Mouthfeel:: ${collectDescriptor('mouthfeel') || '-'}`);
      lines.push(`    - Notes:: ${getValue('descriptive_notes') || '-'}`);
      lines.push(`  - Intensity`);
      lines.push(`    - Fragrance:: ${getValue('intensity_fragrance') || '0'}`);

      lines.push(`    - Flavor:: ${getValue('intensity_flavor') || '0'}`);
      lines.push(`    - Aftertaste:: ${getValue('intensity_aftertaste') || '0'}`);

      lines.push(`    - Mouthfeel:: ${getValue('intensity_mouthfeel') || '0'}`);

    function slugify(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[\s\/]+/g, '-')
        .replace(/[^a-z0-9\-_]/g, '')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function getCupperShort() {
      const name = getValue('cupper') || '';
      const parts = name.trim().toLowerCase().split(' ').filter(Boolean);

      if (parts.length === 0) return 'xx';
      if (parts.length === 1) return parts[0].slice(0, 2);

      return parts.map(p => p[0]).join('').slice(0, 3);
    }

    function getSafeFilenameBase() {
      const date = getValue('cupping_date') || getLocalDateString();
      const sample = slugify(getValue('sample_id')) || 'sample';
      const coffee = slugify(getValue('coffee')) || 'coffee';
      const cupper = slugify(getCupperShort()) || 'xx';

      return `${date}-${sample}-${coffee}-${cupper}`;
    }

    function buildRecordObject() {
      return {
        coffee: getValue('coffee') || '',
        sample_id: getValue('sample_id') || '',
        cupping_date: getValue('cupping_date') || '',
        cupper: getValue('cupper') || '',
        session: getValue('session') || '',
        round_no: getValue('round_no') || '',
        origin: getValue('origin') || '',
        variety: getValue('variety') || '',
        process: getValue('process') || '',
        descriptors: {
          fragrance_aroma: {
            selected: [...selected.fragrance_aroma],
            custom: getValue('custom_fragrance_aroma') || ''
          },
          flavor: {
            selected: [...selected.flavor],
            custom: getValue('custom_flavor') || ''
          },
          aftertaste: {
            selected: [...selected.aftertaste],
            custom: getValue('custom_aftertaste') || ''
          },
          acidity: {
            selected: [...selected.acidity],
            custom: getValue('custom_acidity') || ''
          },
          sweetness: {
            selected: [...selected.sweetness],
            custom: getValue('custom_sweetness') || ''
          },
          mouthfeel: {
            selected: [...selected.mouthfeel],
            custom: getValue('custom_mouthfeel') || ''
          }
        },
        intensity: {
          fragrance: Number(getValue('intensity_fragrance') || 0),
          aroma: Number(getValue('intensity_aroma') || 0),
          flavor: Number(getValue('intensity_flavor') || 0),
          aftertaste: Number(getValue('intensity_aftertaste') || 0),
          acidity: Number(getValue('intensity_acidity') || 0),
          sweetness: Number(getValue('intensity_sweetness') || 0),
          mouthfeel: Number(getValue('intensity_mouthfeel') || 0)
        },
        descriptive_notes: getValue('descriptive_notes') || '',
        defects: getValue('defects') || '',
        tasting_notes: getValue('tasting_notes') || '',
        next_action: getValue('next_action') || '',
        tags: getValue('tags') || '#cupping #cva #coffee',
        created_at: new Date().toISOString()
      };
    }

    function buildMarkdownOutput() {
      const record = buildRecordObject();
      const descriptorLine = (label, value) => `- **${label}:** ${value || '-'}`;

      const lines = [];
      lines.push(`# CVA Cupping Note`);
      lines.push('');
      lines.push(`- **Coffee:** ${record.coffee || '-'}`);
      lines.push(`- **Sample:** ${record.sample_id || '-'}`);
      lines.push(`- **Date:** ${record.cupping_date || '-'}`);
      lines.push(`- **Cupper:** ${record.cupper || '-'}`);
      lines.push(`- **Session:** ${record.session || '-'}`);
      lines.push(`- **Round:** ${record.round_no || '-'}`);
      lines.push(`- **Origin:** ${record.origin || '-'}`);
      lines.push(`- **Variety:** ${record.variety || '-'}`);
      lines.push(`- **Process:** ${record.process || '-'}`);
      lines.push('');
      lines.push(`## Descriptors`);
      lines.push(descriptorLine('Fragrance/Aroma', collectDescriptor('fragrance_aroma')));
      lines.push(descriptorLine('Flavor', collectDescriptor('flavor')));
      lines.push(descriptorLine('Aftertaste', collectDescriptor('aftertaste')));
      lines.push(descriptorLine('Acidity', collectDescriptor('acidity')));
      lines.push(descriptorLine('Sweetness', collectDescriptor('sweetness')));
      lines.push(descriptorLine('Mouthfeel', collectDescriptor('mouthfeel')));
      lines.push(descriptorLine('Notes', record.descriptive_notes));
      lines.push('');
      lines.push(`## Intensity (0–15)`);
      lines.push(`- **Fragrance:** ${record.intensity.fragrance}`);
      lines.push(`- **Aroma:** ${record.intensity.aroma}`);
      lines.push(`- **Flavor:** ${record.intensity.flavor}`);
      lines.push(`- **Aftertaste:** ${record.intensity.aftertaste}`);
      lines.push(`- **Acidity:** ${record.intensity.acidity}`);
      lines.push(`- **Sweetness:** ${record.intensity.sweetness}`);
      lines.push(`- **Mouthfeel:** ${record.intensity.mouthfeel}`);
      lines.push('');
      lines.push(descriptorLine('Defects', record.defects));
      lines.push(descriptorLine('Tasting Notes', record.tasting_notes));
      lines.push(descriptorLine('Next Action', record.next_action));
      lines.push(descriptorLine('Tags', record.tags));
      return lines.join('\n');
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadJsonFile() {
      generateOutput();
      const record = buildRecordObject();
      const filename = `${getSafeFilenameBase()}.json`;
      const content = JSON.stringify(record, null, 2);
      downloadFile(filename, content, 'application/json');
    }

    function downloadMarkdownFile() {
      generateOutput();
      const filename = `${getSafeFilenameBase()}.md`;
      const content = buildMarkdownOutput();
      downloadFile(filename, content, 'text/markdown');
    }

    async function copyTextSmart(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        throw new Error('Clipboard API unavailable');
      } catch {
        const temp = document.createElement('textarea');
        temp.value = text;
        temp.setAttribute('readonly', '');
        temp.style.position = 'absolute';
        temp.style.left = '-9999px';
        document.body.appendChild(temp);
        temp.select();
        temp.setSelectionRange(0, temp.value.length);

        try {
          const ok = document.execCommand('copy');
          document.body.removeChild(temp);
          return ok;
        } catch {
          document.body.removeChild(temp);
          return false;
        }
      }
    }

    function resetForm() {
      document.querySelectorAll('input, textarea').forEach(el => {
        if (el.type === 'range') {
          el.value = '0';
        } else if (el.id === 'tags') {
          el.value = '#cupping #cva #coffee';
        } else if (el.id === 'cupping_date') {
          el.value = getLocalDateString();
        } else {
          el.value = '';
        }
      });

      document.querySelectorAll('select').forEach(el => {
        el.value = '';
      });

      Object.keys(selected).forEach(k => {
        selected[k] = [];
      });

      document.querySelectorAll('.chip.active').forEach(ch => {
        ch.classList.remove('active');
      });

      [
        'fragrance_value', 'aroma_value',
        'flavor_value', 'aftertaste_value', 'acidity_value', 'sweetness_value', 'mouthfeel_value'
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '0';
      });

      document.getElementById('output').textContent = '';
      document.getElementById('descriptorOutput').innerHTML = '';
      generateOutput();
    }

    async function copyOutput() {
      const text = generateOutput();
      const ok = await copyTextSmart(text);
      alert(ok ? 'Copied to clipboard' : 'Copy failed. Please copy manually.');
    }

    async function copyLogseqOutput() {
      generateOutput();
      const text = buildLogseqOutput();
      const ok = await copyTextSmart(text);
      alert(ok ? 'Copied Logseq format' : 'Copy failed. Please copy manually.');
    }

    function setupTheme() {
      const toggleBtn = document.getElementById('themeToggle');
      const savedTheme = localStorage.getItem('casa-cupping-theme');

      if (savedTheme === 'dark') {
        document.body.classList.add('dark');
      }

      updateThemeButton();

      toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('casa-cupping-theme', isDark ? 'dark' : 'light');
        updateThemeButton();
      });

      function updateThemeButton() {
        const isDark = document.body.classList.contains('dark');
        toggleBtn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
      }
    }

    document.getElementById('generateBtn').addEventListener('click', generateOutput);
    document.getElementById('copyBtn').addEventListener('click', copyOutput);
    document.getElementById('copyLogseqBtn').addEventListener('click', copyLogseqOutput);
    document.getElementById('downloadJsonBtn').addEventListener('click', downloadJsonFile);
    document.getElementById('downloadMdBtn').addEventListener('click', downloadMarkdownFile);
    document.getElementById('resetBtn').addEventListener('click', resetForm);

    renderDescriptors();
    setupTheme();
    document.getElementById('cupping_date').value = getLocalDateString();
    generateOutput();
  </script>
