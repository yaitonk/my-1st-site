<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Notes CVA Cupping Form — Gen Z Compact v2</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: #fffdf9;
      --text: #2a241d;
      --muted: #6b6258;
      --line: #ddd2c6;
      --chip: #efe7dc;
      --chip-active: #d6c2aa;
      --accent: #8a6846;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1140px;
      margin: 0 auto;
      padding: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 12px;
      line-height: 1.35;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.12fr 0.88fr;
      gap: 12px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.035);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 2px 0 10px;
      line-height: 1.2;
    }

    .main-fields {
      display: grid;
      grid-template-columns: repeat(6, minmax(0,1fr));
      gap: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .span-6 { grid-column: span 6; }
    .span-3 { grid-column: span 3; }
    .span-2 { grid-column: span 2; }

    label {
      font-size: 10.5px;
      color: var(--muted);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    input, textarea, select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 9px;
      background: white;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      line-height: 1.25;
    }

    input, select {
      height: 34px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .group { margin-bottom: 14px; }

    .group h3 {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--accent);
      text-transform: capitalize;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      padding: 6px 9px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
      user-select: none;
    }

    .chip.active {
      background: var(--chip-active);
      border-color: #b99f80;
    }

    .custom-row {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .custom-row input {
      flex: 1;
    }

    .custom-toggle {
      min-width: fit-content;
    }

    .mini-intensity {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: #fff;
    }

    .mini-intensity + .mini-intensity {
      margin-top: 6px;
    }

    .mini-intensity-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .mini-intensity-label {
      color: var(--muted);
    }

    .mini-intensity-value {
      font-weight: 700;
      min-width: 18px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      padding: 0;
      height: auto;
      border: none;
      background: transparent;
    }

    .intensity-band {
      margin-top: 6px;
    }

    .intensity-segments {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      height: 10px;
      background: #f4eee6;
    }

    .intensity-segment {
      position: relative;
    }

    .intensity-segment + .intensity-segment {
      border-left: 1px solid var(--line);
    }

    .intensity-labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin-top: 4px;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      line-height: 1.1;
      letter-spacing: 0.03em;
    }

    .detail-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .detail-fields .full {
      grid-column: 1 / -1;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      min-height: 360px;
      font-size: 13px;
      line-height: 1.5;
      overflow: auto;
      margin: 0;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.35;
    }

    .descriptor-output {
      margin-bottom: 12px;
      display: grid;
      gap: 8px;
    }

    .descriptor-row {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
    }

    .descriptor-label {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .descriptor-score-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .descriptor-score {
      font-weight: 700;
    }

    .descriptor-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .descriptor-tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--chip);
      font-size: 12px;
      line-height: 1.2;
      color: var(--text);
    }

    .descriptor-empty {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .descriptor-meter {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .descriptor-meter + .descriptor-meter {
      margin-top: 4px;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 8px; }
      h1 { font-size: 16px; }
      .sub { font-size: 11px; margin-bottom: 8px; }
      .card { padding: 10px; border-radius: 14px; }
      .section-title { font-size: 14px; margin-bottom: 8px; }

      .main-fields {
        grid-template-columns: repeat(6, minmax(0,1fr));
        gap: 6px;
      }

      .main-fields .coffee-field { grid-column: span 6; }
      .main-fields .orig-field,
      .main-fields .var-field,
      .main-fields .date-field,
      .main-fields .by-field { grid-column: span 3; }
      .main-fields .sess-field,
      .main-fields .rnd-field,
      .main-fields .id-field { grid-column: span 2; }
      .main-fields .proc-field { grid-column: span 6; }

      label { font-size: 10px; }
      input, select { height: 32px; padding: 5px 8px; font-size: 12px; }
      textarea { min-height: 68px; padding: 7px 8px; font-size: 12px; }

      .chips { gap: 5px; }
      .chip { font-size: 11px; padding: 5px 8px; }
      .group h3 { font-size: 12px; }
      .custom-row { gap: 5px; }
      .detail-fields { grid-template-columns: 1fr; gap: 6px; margin-top: 10px; }
      .actions { gap: 6px; }
      button { font-size: 12px; padding: 7px 10px; }
      pre { min-height: 280px; font-size: 12px; padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>mini CVA Cupping Form — Casa R&d Gen Z style</h1>
    <div class="sub">Compact version</div>

    <div class="grid">
      <div>
        <div class="card">
          <div class="section-title">ข้อมูลหลัก</div>
          <div class="main-fields">
            <div class="field span-6 coffee-field">
              <label>Coffee</label>
              <input id="coffee" placeholder="Alto Quiel Selecto Natural" />
            </div>

            <div class="field span-3 orig-field">
              <label>Origin</label>
              <input id="origin" placeholder="Panama" />
            </div>

            <div class="field span-3 var-field">
              <label>Variety</label>
              <input id="variety" placeholder="Geisha" />
            </div>

            <div class="field span-3 date-field">
              <label>Date</label>
              <input id="cupping_date" type="date" />
            </div>

            <div class="field span-3 by-field">
              <label>By</label>
              <input id="cupper" placeholder="Name" />
            </div>

            <div class="field span-2 sess-field">
              <label>Session</label>
              <select id="session">
                <option value="">-</option>
                <option value="AM">AM</option>
                <option value="PM">PM</option>
                <option value="S1">S1</option>
                <option value="S2">S2</option>
                <option value="S3">S3</option>
                <option value="Final">Final</option>
              </select>
            </div>

            <div class="field span-2 rnd-field">
              <label>Round</label>
              <select id="round_no">
                <option value="">-</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>

            <div class="field span-2 id-field">
              <label>ID</label>
              <input id="sample_id" placeholder="B04" />
            </div>

            <div class="field span-6 proc-field">
              <label>Process</label>
              <input id="process" placeholder="Natural" />
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:10px;">
          <div class="section-title">Descriptors</div>
          <div id="descriptor-groups"></div>

          <div class="detail-fields">
            <div class="field full">
              <label>Overall & Remark</label>
              <textarea id="descriptive_notes" placeholder="floral low / โทนดอกไม้ยังเบา, sweetness clear / ความหวานชัด"></textarea>
            </div>

            <div class="field">
              <label>Defects</label>
              <input id="defects" placeholder="none / ไม่มี" />
            </div>

            <div class="field full">
              <label>Tasting Notes</label>
              <textarea id="tasting_notes" placeholder="sweet, clean, good mouthfeel / หวานสะอาด สัมผัสดี"></textarea>
            </div>

            <div class="field full">
              <label>Next</label>
              <textarea id="next_action" placeholder="compare with artisan graph later / ค่อยเทียบกับกราฟ Artisan ภายหลัง"></textarea>
            </div>

            <div class="field full">
              <label>Tags</label>
              <input id="tags" value="#cupping #cva #coffee" />
            </div>
          </div>

          <div class="actions">
            <button type="button" class="primary" id="generateBtn">Generate</button>
            <button type="button" id="copyBtn">Copy</button>
            <button type="button" id="copyLogseqBtn">Copy for Logseq</button>
            <button type="button" id="downloadJsonBtn">Download JSON</button>
            <button type="button" id="downloadMdBtn">Download Markdown</button>
            <button type="button" id="resetBtn">Reset</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">ผลลัพธ์</div>
        <div id="descriptorOutput" class="descriptor-output"></div>
        <pre id="output"></pre>
        <div class="hint">Don’t be swayed by the fragrance!</div>
      </div>
    </div>
  </div>

  <script>
    const descriptorData = {
      fragrance_aroma: [
        'floral / ดอกไม้','jasmine / มะลิ','bergamot / เบอร์กามอต','citrus / ซิตรัส',
        'berry / เบอร์รี','tropical fruit / ผลไม้เมืองร้อน','stone fruit / ผลไม้เมล็ดแข็ง',
        'honey / น้ำผึ้ง','candy / ลูกกวาด','caramel / คาราเมล','tea-like / คล้ายชา',
        'herbal / สมุนไพร','cocoa / โกโก้','spice / เครื่องเทศ'
      ],
      flavor: [
        'floral / ดอกไม้','jasmine / มะลิ','bergamot / เบอร์กามอต','citrus / ซิตรัส',
        'berry / เบอร์รี','tropical fruit / ผลไม้เมืองร้อน','stone fruit / ผลไม้เมล็ดแข็ง',
        'apple / แอปเปิล','grape / องุ่น','honey / น้ำผึ้ง','candy / ลูกกวาด',
        'caramel / คาราเมล','tea-like / คล้ายชา','cocoa / โกโก้','spice / เครื่องเทศ'
      ],
      aftertaste: [
        'clean / สะอาด','sweet / หวาน','floral / ดอกไม้','tea-like / คล้ายชา',
        'short / สั้น','medium / ปานกลาง','long / ยาว','drying / ฝาดแห้ง',
        'slightly bitter / ขมเล็กน้อย'
      ],
      acidity: [
        'citric / ซิตรัส','malic / มาลิก','tartaric / ทาร์ทาริก','phosphoric / ฟอสฟอริก',
        'lactic / แลกติก','soft / นุ่ม','bright / สดใส','round / กลม','sharp / คม'
      ],
      sweetness: [
        'sugar / น้ำตาล','honey / น้ำผึ้ง','candy / ลูกกวาด','caramel / คาราเมล',
        'brown sugar / น้ำตาลทรายแดง','molasses / กากน้ำตาล','ripe fruit / ผลไม้สุก',
        'jammy / แยม','clean sweet / หวานสะอาด'
      ],
      mouthfeel: [
        'silky / เนียน','juicy / ฉ่ำ','creamy / ครีมมี','smooth / ลื่น',
        'tea-like / คล้ายชา','syrupy / หนืดหวาน','dense / แน่น',
        'thin / บาง','drying / ฝาดแห้ง'
      ]
    };

    const fieldLabels = {
      fragrance_aroma: 'fragrance/aroma',
      flavor: 'flavor',
      aftertaste: 'aftertaste',
      acidity: 'acidity',
      sweetness: 'sweetness',
      mouthfeel: 'mouthfeel'
    };

    const selected = {};
    Object.keys(descriptorData).forEach(k => selected[k] = []);

    function getLocalDateString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function createIntensityBand() {
      const band = document.createElement('div');
      band.className = 'intensity-band';
      band.innerHTML = `
        <div class="intensity-segments">
          <div class="intensity-segment"></div>
          <div class="intensity-segment"></div>
          <div class="intensity-segment"></div>
        </div>
        <div class="intensity-labels">
          <span>LOW</span>
          <span>MEDIUM</span>
          <span>HIGH</span>
        </div>
      `;
      return band;
    }

    function createMiniIntensity(labelText, valueId, rangeId) {
      const miniIntensity = document.createElement('div');
      miniIntensity.className = 'mini-intensity';

      const miniHead = document.createElement('div');
      miniHead.className = 'mini-intensity-head';

      const miniLabel = document.createElement('span');
      miniLabel.className = 'mini-intensity-label';
      miniLabel.textContent = labelText;

      const miniValue = document.createElement('strong');
      miniValue.className = 'mini-intensity-value';
      miniValue.id = valueId;
      miniValue.textContent = '0';

      miniHead.appendChild(miniLabel);
      miniHead.appendChild(miniValue);

      const range = document.createElement('input');
      range.type = 'range';
      range.min = '0';
      range.max = '15';
      range.step = '1';
      range.value = '0';
      range.id = rangeId;
      range.addEventListener('input', () => {
        miniValue.textContent = range.value;
      });

      miniIntensity.appendChild(miniHead);
      miniIntensity.appendChild(range);
      miniIntensity.appendChild(createIntensityBand());

      return miniIntensity;
    }

    function renderDescriptors() {
      const root = document.getElementById('descriptor-groups');
      root.innerHTML = '';

      Object.entries(descriptorData).forEach(([field, options]) => {
        const group = document.createElement('div');
        group.className = 'group';

        const title = document.createElement('h3');
        title.textContent = fieldLabels[field] || field;

        const chips = document.createElement('div');
        chips.className = 'chips';

        options.forEach(option => {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'chip';
          chip.textContent = option;

          chip.addEventListener('click', () => {
            const arr = selected[field];
            const idx = arr.indexOf(option);

            if (idx >= 0) {
              arr.splice(idx, 1);
              chip.classList.remove('active');
            } else {
              arr.push(option);
              chip.classList.add('active');
            }
          });

          chips.appendChild(chip);
        });

        const customRow = document.createElement('div');
        customRow.className = 'custom-row';

        const customToggle = document.createElement('button');
        customToggle.type = 'button';
        customToggle.className = 'chip custom-toggle';
        customToggle.textContent = 'other / อื่นๆ';

        const customInput = document.createElement('input');
        customInput.id = 'custom_' + field;
        customInput.placeholder = 'พิมพ์ descriptor เพิ่มเอง';

        customToggle.addEventListener('click', () => customInput.focus());

        customRow.appendChild(customToggle);
        customRow.appendChild(customInput);

        group.appendChild(title);
        group.appendChild(chips);
        group.appendChild(customRow);

        if (field === 'fragrance_aroma') {
          group.appendChild(
            createMiniIntensity('Fragrance 0–15', 'fragrance_value', 'intensity_fragrance')
          );
          group.appendChild(
            createMiniIntensity('Aroma 0–15', 'aroma_value', 'intensity_aroma')
          );
        } else {
          group.appendChild(
            createMiniIntensity('Intensity 0–15', field + '_value', 'intensity_' + field)
          );
        }

        root.appendChild(group);
      });
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : '';
    }

    function scoreBar(value, max = 15) {
      const n = Number(value || 0);
      const filled = Math.max(0, Math.min(5, Math.round((n / max) * 5)));
      return '█'.repeat(filled) + '░'.repeat(5 - filled);
    }

    function line(prefix, value) {
      return value ? `${prefix} ${value}` : `${prefix} -`;
    }

    function collectDescriptor(field) {
      const vals = [...selected[field]];
      const custom = getValue('custom_' + field);
      if (custom) vals.push('other / อื่นๆ: ' + custom);
      return vals.join(', ');
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderDescriptorOutput() {
      const root = document.getElementById('descriptorOutput');

      const descriptorFields = [
        { key: 'fragrance_aroma', label: '👃 Fragrance/Aroma' },
        { key: 'flavor', label: '🍬 Flavor' },
        { key: 'aftertaste', label: '🫧 Aftertaste' },
        { key: 'acidity', label: '✨ Acidity' },
        { key: 'sweetness', label: '🍯 Sweetness' },
        { key: 'mouthfeel', label: '🫶 Mouthfeel' }
      ];

      root.innerHTML = descriptorFields.map(({ key, label }) => {
        const values = [...selected[key]];
        const custom = getValue('custom_' + key);
        if (custom) values.push('other / อื่นๆ: ' + custom);

        const tagsHtml = values.length
          ? `<div class="descriptor-tags">
              ${values.map(v => `<span class="descriptor-tag">${escapeHtml(v)}</span>`).join('')}
            </div>`
          : `<div class="descriptor-empty">-</div>`;

        if (key === 'fragrance_aroma') {
          const fragrance = getValue('intensity_fragrance') || '0';
          const aroma = getValue('intensity_aroma') || '0';

          return `
            <div class="descriptor-row">
              <div class="descriptor-label">
                <span>${label}</span>
                <span class="descriptor-score-stack">
                  <span class="descriptor-score">Fragrance ${fragrance}/15</span>
                  <span class="descriptor-score">Aroma ${aroma}/15</span>
                </span>
              </div>
              ${tagsHtml}
              <div class="descriptor-meter">Fragrance  ${scoreBar(fragrance)}</div>
              <div class="descriptor-meter">Aroma      ${scoreBar(aroma)}</div>
            </div>
          `;
        }

        const intensity = getValue('intensity_' + key) || '0';

        return `
          <div class="descriptor-row">
            <div class="descriptor-label">
              <span>${label}</span>
              <span class="descriptor-score-stack">
                <span class="descriptor-score">${intensity}/15</span>
              </span>
            </div>
            ${tagsHtml}

    function slugify(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/[\s\/]+/g, '-')
    .replace(/[^a-z0-9\-_]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function getCupperShort() {
  const name = getValue('cupper') || '';
  const parts = name.trim().toLowerCase().split(' ').filter(Boolean);

  if (parts.length === 0) {
    return 'xx';
  }

  if (parts.length === 1) {
    return parts[0].slice(0, 2);
  }

  return parts.map(p => p[0]).join('').slice(0, 3);
}

function getSafeFilenameBase() {
  const date = getValue('cupping_date') || getLocalDateString();
  const sample = slugify(getValue('sample_id')) || 'sample';
  const coffee = slugify(getValue('coffee')) || 'coffee';
  const cupper = slugify(getCupperShort()) || 'xx';

  return `${date}-${sample}-${coffee}-${cupper}`;
}

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadJsonFile() {
      generateOutput();
      const record = buildRecordObject();
      const filename = `${getSafeFilenameBase()}.json`;
      const content = JSON.stringify(record, null, 2);
      downloadFile(filename, content, 'application/json');
    }

    function downloadMarkdownFile() {
      generateOutput();
      const filename = `${getSafeFilenameBase()}.md`;
      const content = buildMarkdownOutput();

    async function copyTextSmart(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        throw new Error('Clipboard API unavailable');
      } catch {
        const temp = document.createElement('textarea');
        temp.value = text;
        temp.setAttribute('readonly', '');
        temp.style.position = 'absolute';
        temp.style.left = '-9999px';
        document.body.appendChild(temp);
        temp.select();
        temp.setSelectionRange(0, temp.value.length);

        try {
          const ok = document.execCommand('copy');
          document.body.removeChild(temp);
          return ok;
        } catch {
          document.body.removeChild(temp);
          return false;
        }
      }
    }

    function resetForm() {
      document.querySelectorAll('input, textarea').forEach(el => {
        if (el.type === 'range') {
          el.value = '0';
        } else if (el.id === 'tags') {
          el.value = '#cupping #cva #coffee';
        } else if (el.id === 'cupping_date') {
          el.value = getLocalDateString();
        } else {
          el.value = '';
        }
      });

      document.querySelectorAll('select').forEach(el => {
        el.value = '';
      });

      Object.keys(selected).forEach(k => {
        selected[k] = [];
      });

      document.querySelectorAll('.chip.active').forEach(ch => {
        ch.classList.remove('active');
      });

      [
        'fragrance_value', 'aroma_value',
        'flavor_value', 'aftertaste_value', 'acidity_value', 'sweetness_value', 'mouthfeel_value'
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '0';
      });

      document.getElementById('output').textContent = '';
      document.getElementById('descriptorOutput').innerHTML = '';
      generateOutput();
    }
