<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casa Lab</title>

  <style>
    :root{
      --bg1:#eef4ff;
      --bg2:#f8f6ff;
      --bg3:#f6fbf7;
      --glass:rgba(255,255,255,0.55);
      --line:rgba(255,255,255,0.7);
      --text:#17212f;
      --muted:#667085;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(131,182,255,0.35), transparent 25%),
        radial-gradient(circle at 90% 20%, rgba(255,200,150,0.3), transparent 25%),
        linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .orb{
      position:fixed;
      width:300px;
      height:300px;
      border-radius:999px;
      filter:blur(30px);
      opacity:0.4;
      z-index:0;
    }

    .orb.one{
      top:0;
      left:-80px;
      background:rgba(120,160,255,0.5);
    }

    .orb.two{
      bottom:-60px;
      right:-80px;
      background:rgba(255,180,120,0.4);
    }

    .card{
      position:relative;
      z-index:1;
      width:100%;
      max-width:600px;
      padding:40px 28px;
      border-radius:28px;
      background:var(--glass);
      backdrop-filter: blur(25px);
      border:1px solid var(--line);
      box-shadow:0 20px 60px rgba(0,0,0,0.1);
      text-align:center;
    }

    h1{
      margin:0;
      font-size:40px;
      letter-spacing:-0.04em;
    }

    .subtitle{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
    }

    .desc{
      margin-top:14px;
      font-size:15px;
      color:var(--muted);
    }

    .buttons{
      margin-top:30px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .btn{
      display:block;
      padding:16px;
      border-radius:18px;
      text-decoration:none;
      font-weight:600;
      font-size:15px;
      transition:0.2s;
      backdrop-filter: blur(10px);
      border:1px solid var(--line);
    }

    .btn-main{
      background:#111;
      color:#fff;
    }

    .btn-sub{
      background:rgba(255,255,255,0.7);
      color:#111;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,0,0,0.12);
    }

    .footer{
      margin-top:20px;
      font-size:12px;
      color:var(--muted);
    }

    @media(max-width:600px){
      h1{ font-size:30px; }
    }

  </style>
</head>
<body>

<div class="orb one"></div>
<div class="orb two"></div>

<div class="card">
  <h1>Casa Lab</h1>
  <div class="subtitle">Cupping System</div>
  <div class="desc">ทดลองใช้งานบน iPad · iPhone · Android</div>

  <div class="buttons">

    <a href="/my-1st-site/mini-cupping.html" class="btn btn-sub">
      ☕ ไปหน้า Cupping
    </a>

    <a href="/casa-cupping-data/dashboard.html" class="btn btn-main">
      📊 เปิด Dashboard Pro Max
    </a>

  </div>

  <div class="footer">
    powered by GitHub Pages
  </div>
</div>

</body>
</html>
